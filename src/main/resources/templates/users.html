<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Users List</title>
</head>
<body>
<th:block th:fragment="content">
    <h2 class="mb-4">Users List</h2>

    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead>
            <tr>
                <th style="width: 5%;">ID</th>
                <th style="width: 15%;">Username</th>
                <th style="width: 15%;">Name</th>
                <th style="width: 15%;">Surname</th>
                <th style="width: 8%;">Age</th>
                <th style="width: 22%;">Roles</th>
                <th style="width: 20%; min-width: 160px;">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}">1</td>
                <td th:text="${user.username}">username</td>
                <td th:text="${user.name}">Name</td>
                <td th:text="${user.surname}">Surname</td>
                <td th:text="${user.age}">25</td>
                <td>
                    <span class="badge bg-primary me-1"
                          th:each="role : ${user.roles}"
                          th:text="${role.name}">ROLE</span>
                </td>
                <td class="admin-actions-cell" style="width: 20%; min-width: 160px;">
                    <button class="btn btn-sm btn-warning"
                            th:onclick="'editUser(' + ${user.id} + ')'">
                        <i class="bi bi-pencil"></i> Edit
                    </button>
                    <button class="btn btn-sm btn-danger"
                            th:onclick="'deleteUser(' + ${user.id} + ')'">
                        <i class="bi bi-trash"></i> Delete
                    </button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</th:block>
</body>
</html>
