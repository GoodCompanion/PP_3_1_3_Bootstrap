<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add User</title>
</head>
<body>
<th:block th:fragment="content">
    <div class="row">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h4>Add New User</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/users/add}" method="post" th:object="${user}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username"
                                   th:field="*{username}" required>
                            <div class="text-danger" th:if="${#fields.hasErrors('username')}">
                                <span th:errors="*{username}">Error</span>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password"
                                   th:field="*{password}" required>
                            <div class="text-danger" th:if="${#fields.hasErrors('password')}">
                                <span th:errors="*{password}">Error</span>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="name" class="form-label">Name</label>
                            <input type="text" class="form-control" id="name"
                                   th:field="*{name}" required>
                            <div class="text-danger" th:if="${#fields.hasErrors('name')}">
                                <span th:errors="*{name}">Error</span>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="surname" class="form-label">Surname</label>
                            <input type="text" class="form-control" id="surname"
                                   th:field="*{surname}" required>
                            <div class="text-danger" th:if="${#fields.hasErrors('surname')}">
                                <span th:errors="*{surname}">Error</span>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="age" class="form-label">Age</label>
                            <input type="number" class="form-control" id="age"
                                   th:field="*{age}" min="0" max="150">
                            <div class="text-danger" th:if="${#fields.hasErrors('age')}">
                                <span th:errors="*{age}">Error</span>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Roles</label>
                            <div th:each="role : ${allRoles}">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox"
                                           th:value="${role.id}"
                                           name="roleIds"
                                           th:id="'role_' + ${role.id}">
                                    <label class="form-check-label" th:for="'role_' + ${role.id}">
                                        <span th:text="${role.name}">ROLE</span>
                                    </label>
                                </div>
                            </div>
                            <div class="text-danger mt-2" th:if="${#fields.hasErrors('roleIds')}">
                                <span th:errors="*{roleIds}">Error</span>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-plus-circle"></i> Add User
                        </button>
                        <button type="button" class="btn btn-secondary"
                                onclick="loadPage('users')">Cancel</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
