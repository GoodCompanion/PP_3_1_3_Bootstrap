<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ?: 'User Management'">User Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .sidebar {
            min-height: calc(100vh - 56px);
            background-color: #f8f9fa;
        }
        .role-badge {
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
        }
        .role-badge:hover {
            transform: scale(1.05);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .role-badge.active {
            box-shadow: 0 0 0 2px white, 0 0 0 4px #0d6efd;
        }
        .tab-button {
            cursor: pointer;
            border: none;
            background: none;
            color: #6c757d;
            font-weight: 500;
        }
        .tab-button:hover {
            color: #0d6efd;
        }
        .tab-button.active {
            border-bottom: 3px solid #0d6efd;
            color: #0d6efd;
        }
        .modal-backdrop {
            background-color: rgba(0, 0, 0, 0.5);
        }
        .badge {
            margin-right: 3px;
        }
        .card {
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }
        .modal-body {
            max-height: 70vh;
            overflow-y: auto;
        }

        .table {
            table-layout: fixed;
            width: 100%;
        }

        .table th {
            background-color: #f8f9fa;
        }

        .table th, .table td {
            vertical-align: middle;
            word-wrap: break-word;
        }

        .admin-header {
        }

        .admin-actions-cell {
        }

        .admin-actions-cell .btn {
            visibility: hidden;
        }

        .admin-actions-cell.visible .btn {
            visibility: visible;
        }

        .avatar-circle {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .avatar-initials {
            color: white;
            font-size: 36px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .info-card {
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .info-card:hover {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border-color: #dee2e6;
        }

        .card {
            border-radius: 10px;
            overflow: hidden;
        }

        .card-header {
            border-bottom: none;
        }

        .border-end {
            border-right: 1px solid #dee2e6;
        }

        @media (max-width: 768px) {
            .border-end {
                border-right: none;
                border-bottom: 1px solid #dee2e6;
                padding-bottom: 20px;
                margin-bottom: 20px;
            }
        }
    </style>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.parameterName}"/>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">
            <i class="bi bi-shield-lock"></i> User Management System
        </span>

        <div class="d-flex align-items-center text-light">
            <div class="me-3">
                <span sec:authentication="principal.username">Username</span>
                <span class="badge bg-info ms-2"
                      th:each="role : ${#authentication.principal.authorities}"
                      th:text="${role.authority}">ROLE</span>
            </div>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button type="submit" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar p-3">
            <h6 class="text-muted mb-3">Roles</h6>
            <div class="d-grid gap-2" id="roleSwitcher">
                <th:block th:each="role : ${#authentication.principal.authorities}">
                    <div class="role-badge p-2 rounded bg-light border"
                         th:data-role="${role.authority}"
                         th:text="${role.authority}">
                        ROLE
                    </div>
                </th:block>
            </div>
        </div>

        <div class="col-md-10 p-4">
            <div class="d-flex border-bottom mb-3" id="contentTabs">
                <button class="btn btn-link text-decoration-none tab-button px-4 py-2 active"
                        data-page="users">
                    <i class="bi bi-people"></i> Users List
                </button>
                <button class="btn btn-link text-decoration-none tab-button px-4 py-2"
                        data-page="profile">
                    <i class="bi bi-person"></i> My Profile
                </button>
                <button class="btn btn-link text-decoration-none tab-button px-4 py-2"
                        data-page="add"
                        id="addTab">
                    <i class="bi bi-plus-circle"></i> Add User
                </button>
            </div>

            <div id="mainContent">
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit User</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="editModalBody">
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Confirm Delete</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete this user?</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <form id="deleteForm" method="post" style="display: inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-danger">Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
    var csrfToken = $("meta[name='_csrf']").attr("content");
    var csrfHeader = $("meta[name='_csrf_header']").attr("content");

    if (csrfToken && csrfHeader) {
        $(document).ajaxSend(function(e, xhr, options) {
            xhr.setRequestHeader(csrfHeader, csrfToken);
        });
    }
    var currentRole = null;

    $(document).ready(function() {
        var roleElements = $('#roleSwitcher .role-badge');
        var roles = [];

        roleElements.each(function() {
            roles.push($(this).data('role'));
        });

        console.log('Available roles:', roles);

        if (roles.includes('ROLE_ADMIN')) {
            currentRole = 'ROLE_ADMIN';
        } else if (roles.length > 0) {
            currentRole = roles[0];
        }

        console.log('Selected role:', currentRole);

        activateRole(currentRole);

        loadPage('users');

        $('#roleSwitcher .role-badge').click(function() {
            var role = $(this).data('role');
            console.log('Switching to role:', role);
            currentRole = role;
            activateRole(role);

            var activeTab = $('#contentTabs .tab-button.active').data('page') || 'users';
            loadPage(activeTab);
        });

        $('#contentTabs .tab-button').click(function(e) {
            e.preventDefault();
            const page = $(this).data('page');

            $('#contentTabs .tab-button').removeClass('active');
            $(this).addClass('active');

            loadPage(page);
        });
    });

    function activateRole(role) {
        $('#roleSwitcher .role-badge').removeClass('active');
        $('#roleSwitcher .role-badge[data-role="' + role + '"]').addClass('active');

        if (role === 'ROLE_ADMIN') {
            $('#addTab').show();
            $('.admin-actions-cell').addClass('visible');
        } else {
            $('#addTab').hide();
            $('.admin-actions-cell').removeClass('visible');

            if ($('#contentTabs .tab-button[data-page="add"]').hasClass('active')) {
                $('#contentTabs .tab-button').removeClass('active');
                $('#contentTabs .tab-button[data-page="users"]').addClass('active');
            }
        }
    }

    function loadPage(page) {
        if (currentRole === 'ROLE_USER' && page === 'add') {
            page = 'users';
            $('#contentTabs .tab-button').removeClass('active');
            $('#contentTabs .tab-button[data-page="users"]').addClass('active');
        }

        let url;
        switch(page) {
            case 'users':
                url = currentRole === 'ROLE_ADMIN' ? '/admin/users-content' : '/user/users-content';
                break;
            case 'profile':
                url = '/user/profile-content';
                break;
            case 'add':
                url = '/admin/users/add-content';
                break;
            default:
                url = '/admin/users-content';
        }

        $.get(url, function(data) {
            $('#mainContent').html(data);

            if (currentRole === 'ROLE_ADMIN') {
                $('.admin-actions-cell').addClass('visible');
            } else {
                $('.admin-actions-cell').removeClass('visible');
            }
        });
    }

    function editUser(userId) {
        if (currentRole !== 'ROLE_ADMIN') {
            alert('You need ADMIN role to edit users');
            return;
        }

        $.get('/admin/users/edit/' + userId, function(data) {
            $('#editModalBody').html(data);
            var editModal = new bootstrap.Modal(document.getElementById('editModal'));
            editModal.show();

            $('#editUserForm').off('submit').on('submit', function(e) {
                e.preventDefault();

                var formData = $(this).serialize();

                $.ajax({
                    type: 'POST',
                    url: '/admin/users/edit',
                    data: formData,
                    success: function(response) {
                        if (response.includes('text-danger')) {
                            $('#editModalBody').html(response);
                        } else {
                            editModal.hide();
                            var activeTab = $('#contentTabs .tab-button.active').data('page') || 'users';
                            loadPage(activeTab);
                        }
                    },
                    error: function(xhr, status, error) {
                        console.error('Error updating user:', error);
                        if (xhr.responseText && xhr.responseText.includes('<form')) {
                            $('#editModalBody').html(xhr.responseText);
                        } else {
                            alert('Error updating user. Please try again.');
                        }
                    }
                });
            });
        });
    }

    function bindEditFormSubmit() {
        $('#editUserForm').on('submit', function(e) {
            e.preventDefault();

            var formData = $(this).serialize();

            $.ajax({
                type: 'POST',
                url: '/admin/users/edit',
                data: formData,
                success: function(response) {
                    if (response.includes('text-danger')) {
                        $('#editModalBody').html(response);
                        bindEditFormSubmit();
                    } else {
                        var editModal = bootstrap.Modal.getInstance(document.getElementById('editModal'));
                        editModal.hide();
                        var activeTab = $('#contentTabs .tab-button.active').data('page') || 'users';
                        loadPage(activeTab);
                    }
                },
                error: function(xhr, status, error) {
                    console.error('Error updating user:', error);
                    alert('Error updating user. Please try again.');
                }
            });
        });
    }

    function deleteUser(userId) {
        if (currentRole !== 'ROLE_ADMIN') {
            alert('You need ADMIN role to delete users');
            return;
        }

        var deleteUrl = '/admin/users/delete/' + userId;
        $('#deleteForm').attr('action', deleteUrl);

        var deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));
        deleteModal.show();

        $('#deleteForm').off('submit').on('submit', function(e) {
            e.preventDefault();

            var formData = $(this).serialize();

            $.ajax({
                type: 'POST',
                url: deleteUrl,
                data: formData,  // Важно: отправляем данные формы с CSRF-токеном
                success: function(response) {
                    deleteModal.hide();
                    if (response === 'self-deleted') {
                        window.location.href = '/login';
                    } else {
                        var activeTab = $('#contentTabs .tab-button.active').data('page') || 'users';
                        loadPage(activeTab);
                    }
                },
                error: function(xhr, status, error) {
                    console.error('Error deleting user:', error);
                    console.error('Status:', status);
                    console.error('Response:', xhr.responseText);
                    alert('Error deleting user. Please try again.');
                }
            });
        });
    }
</script>
</body>
</html>
