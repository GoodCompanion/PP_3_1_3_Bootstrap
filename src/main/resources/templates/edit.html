<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>
<div class="edit-form-container">
    <form id="editUserForm" th:object="${user}">
        <input type="hidden" th:field="*{id}" name="id">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="mb-3">
            <label for="editUsername" class="form-label">Username</label>
            <input type="text" class="form-control" id="editUsername"
                   th:field="*{username}" name="username" required>
            <div class="text-danger" th:if="${#fields.hasErrors('username')}">
                <span th:errors="*{username}">Error</span>
            </div>
        </div>

        <div class="mb-3">
            <label for="editPassword" class="form-label">Password</label>
            <input type="password" class="form-control" id="editPassword"
                   th:field="*{password}" name="password" placeholder="Leave empty to keep current">
            <small class="text-muted">Оставьте пустым, чтобы не изменять пароль</small>
            <div class="text-danger" th:if="${#fields.hasErrors('password')}">
                <span th:errors="*{password}">Error</span>
            </div>
        </div>

        <div class="mb-3">
            <label for="editName" class="form-label">Name</label>
            <input type="text" class="form-control" id="editName"
                   th:field="*{name}" name="name" required>
            <div class="text-danger" th:if="${#fields.hasErrors('name')}">
                <span th:errors="*{name}">Error</span>
            </div>
        </div>

        <div class="mb-3">
            <label for="editSurname" class="form-label">Surname</label>
            <input type="text" class="form-control" id="editSurname"
                   th:field="*{surname}" name="surname" required>
            <div class="text-danger" th:if="${#fields.hasErrors('surname')}">
                <span th:errors="*{surname}">Error</span>
            </div>
        </div>

        <div class="mb-3">
            <label for="editAge" class="form-label">Age</label>
            <input type="number" class="form-control" id="editAge"
                   th:field="*{age}" name="age" min="0" max="150">
            <div class="text-danger" th:if="${#fields.hasErrors('age')}">
                <span th:errors="*{age}">Error</span>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Roles</label>
            <div th:each="role : ${allRoles}">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox"
                           th:value="${role.id}"
                           name="roleIds"
                           th:id="'edit_role_' + ${role.id}"
                           th:checked="${user.roleIds?.contains(role.id)}">
                    <label class="form-check-label" th:for="'edit_role_' + ${role.id}">
                        <span th:text="${role.name}">ROLE</span>
                    </label>
                </div>
            </div>
            <!-- Добавляем отображение ошибки для roleIds -->
            <div class="text-danger mt-2" th:if="${#fields.hasErrors('roleIds')}">
                <span th:errors="*{roleIds}">Error</span>
            </div>
        </div>

        <div class="d-flex justify-content-end">
            <button type="button" class="btn btn-secondary me-2" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
    </form>
</div>
</body>
</html>
